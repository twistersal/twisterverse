<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Checklist 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --lavender: #c9b8e8;
    --peach: #f2c4b8;
    --sage: #a8bfa8;
    --cream: #faf7f4;
    --gold: #e8d48a;
    --text: #3a3240;
    --text-light: #8a7a9a;
    --card-bg: rgba(255,255,255,0.7);
    --done-color: #a8bfa8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background blobs */
  body::before {
    content: '';
    position: fixed;
    top: -100px; right: -100px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(201,184,232,0.25), transparent 70%);
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -80px; left: -80px;
    width: 350px; height: 350px;
    background: radial-gradient(circle, rgba(242,196,184,0.2), transparent 70%);
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 640px;
    margin: 0 auto;
    padding: 32px 16px 80px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 32px;
  }
  .header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.8rem;
    font-weight: 600;
    letter-spacing: -0.5px;
    line-height: 1.1;
    color: var(--text);
  }
  .header h1 em {
    font-style: italic;
    color: #9b7fc7;
  }
  .header p {
    margin-top: 6px;
    font-size: 0.85rem;
    color: var(--text-light);
    font-weight: 300;
    letter-spacing: 0.3px;
  }

  /* Streak bar */
  .streak-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--card-bg);
    border: 1px solid rgba(201,184,232,0.3);
    border-radius: 16px;
    padding: 14px 18px;
    margin-bottom: 24px;
    backdrop-filter: blur(8px);
  }
  .streak-icon { font-size: 1.5rem; }
  .streak-info { flex: 1; }
  .streak-info .streak-label { font-size: 0.75rem; color: var(--text-light); font-weight: 300; }
  .streak-info .streak-count { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 600; color: var(--text); }
  .reset-btn {
    font-size: 0.72rem;
    color: var(--text-light);
    background: none;
    border: 1px solid rgba(138,122,154,0.2);
    border-radius: 8px;
    padding: 4px 10px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .reset-btn:hover { background: rgba(201,184,232,0.15); color: var(--text); }

  /* Day tabs */
  .day-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: none;
  }
  .day-tabs::-webkit-scrollbar { display: none; }
  .day-tab {
    flex-shrink: 0;
    padding: 8px 14px;
    border-radius: 12px;
    border: 1.5px solid transparent;
    background: var(--card-bg);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--text-light);
    transition: all 0.2s;
    position: relative;
    backdrop-filter: blur(6px);
  }
  .day-tab:hover { color: var(--text); border-color: var(--lavender); }
  .day-tab.active {
    background: linear-gradient(135deg, rgba(201,184,232,0.4), rgba(242,196,184,0.3));
    border-color: var(--lavender);
    color: var(--text);
  }
  .day-tab .tab-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--sage);
    display: inline-block;
    margin-left: 5px;
    vertical-align: middle;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .day-tab.completed .tab-dot { opacity: 1; }

  /* Progress */
  .progress-wrap {
    background: var(--card-bg);
    border: 1px solid rgba(201,184,232,0.25);
    border-radius: 16px;
    padding: 16px 18px;
    margin-bottom: 20px;
    backdrop-filter: blur(8px);
  }
  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }
  .progress-title { font-size: 0.8rem; color: var(--text-light); font-weight: 300; }
  .progress-count { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; color: var(--text); }
  .progress-bar-bg {
    height: 6px;
    background: rgba(201,184,232,0.2);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--lavender), var(--peach));
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  /* Sections */
  .section-label {
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-light);
    margin: 20px 0 8px 4px;
  }

  /* Checklist items */
  .checklist { display: flex; flex-direction: column; gap: 6px; }

  .check-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--card-bg);
    border: 1.5px solid rgba(201,184,232,0.2);
    border-radius: 14px;
    padding: 13px 16px;
    cursor: pointer;
    transition: all 0.25s;
    backdrop-filter: blur(6px);
    user-select: none;
    position: relative;
    overflow: hidden;
  }
  .check-item::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(201,184,232,0.15), rgba(242,196,184,0.1));
    opacity: 0;
    transition: opacity 0.25s;
    border-radius: inherit;
  }
  .check-item:hover::before { opacity: 1; }
  .check-item:hover { border-color: rgba(201,184,232,0.5); transform: translateY(-1px); }
  .check-item:active { transform: translateY(0); }

  .check-item.done {
    background: rgba(168,191,168,0.08);
    border-color: rgba(168,191,168,0.3);
  }
  .check-item.done::before { opacity: 0 !important; }
  .check-item.done:hover { transform: none; border-color: rgba(168,191,168,0.4); }

  /* Checkbox */
  .checkbox {
    flex-shrink: 0;
    width: 22px; height: 22px;
    border-radius: 7px;
    border: 2px solid rgba(201,184,232,0.6);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
  }
  .check-item.done .checkbox {
    background: var(--sage);
    border-color: var(--sage);
    transform: scale(1.1);
  }
  .checkbox-check {
    width: 12px; height: 9px;
    opacity: 0;
    transform: scale(0) rotate(-10deg);
    transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .check-item.done .checkbox-check {
    opacity: 1;
    transform: scale(1) rotate(0deg);
  }
  .checkbox-check::before, .checkbox-check::after {
    content: '';
    position: absolute;
    background: white;
    border-radius: 2px;
  }
  .checkbox-check::before {
    width: 4px; height: 8px;
    top: 7px; left: 13px;
    transform: rotate(45deg);
  }
  .checkbox-check::after {
    width: 4px; height: 5px;
    top: 9px; left: 8px;
    transform: rotate(-45deg);
  }

  /* Checkmark SVG approach */
  .checkmark {
    width: 12px; height: 10px;
    opacity: 0;
    transform: scale(0);
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    transition-delay: 0.05s;
  }
  .check-item.done .checkmark {
    opacity: 1;
    transform: scale(1);
  }

  /* Item content */
  .item-content { flex: 1; }
  .item-emoji { font-size: 1rem; margin-right: 6px; }
  .item-text {
    font-size: 0.875rem;
    font-weight: 400;
    color: var(--text);
    line-height: 1.4;
    transition: all 0.25s;
  }
  .check-item.done .item-text {
    color: var(--text-light);
    text-decoration: line-through;
    text-decoration-color: rgba(168,191,168,0.6);
  }
  .item-sub {
    font-size: 0.75rem;
    color: var(--text-light);
    margin-top: 2px;
    font-weight: 300;
    transition: all 0.25s;
  }
  .check-item.done .item-sub { color: rgba(138,122,154,0.5); }

  /* Time badge */
  .item-time {
    flex-shrink: 0;
    font-size: 0.7rem;
    color: var(--text-light);
    font-weight: 300;
    min-width: 40px;
    text-align: right;
    line-height: 1.3;
  }

  /* Category colors */
  .check-item[data-cat="skincare"] { border-left: 3px solid rgba(201,184,232,0.7); }
  .check-item[data-cat="meal"] { border-left: 3px solid rgba(232,212,138,0.7); }
  .check-item[data-cat="workout"] { border-left: 3px solid rgba(242,196,184,0.9); }
  .check-item[data-cat="study"] { border-left: 3px solid rgba(168,191,168,0.7); }
  .check-item[data-cat="free"] { border-left: 3px solid rgba(200,200,230,0.5); }

  /* Celebration */
  .celebration {
    text-align: center;
    padding: 28px 20px;
    background: linear-gradient(135deg, rgba(201,184,232,0.15), rgba(242,196,184,0.15));
    border: 1.5px solid rgba(201,184,232,0.3);
    border-radius: 20px;
    margin-top: 16px;
    display: none;
    animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .celebration.show { display: block; }
  .celebration .cel-emoji { font-size: 2.5rem; display: block; margin-bottom: 8px; }
  .celebration .cel-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }
  .celebration .cel-sub { font-size: 0.8rem; color: var(--text-light); }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
  }

  /* Particle */
  .particle {
    position: fixed;
    pointer-events: none;
    z-index: 999;
    font-size: 1rem;
    animation: floatUp 1s ease-out forwards;
  }
  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-80px) scale(0.5); }
  }

  /* Day panel */
  .day-panel { display: none; }
  .day-panel.active { display: block; }

  /* Day complete overlay on tab */
  .day-tab.completed { border-color: rgba(168,191,168,0.5); }

  @media (max-width: 480px) {
    .header h1 { font-size: 2.2rem; }
    .day-tab { padding: 7px 11px; font-size: 0.75rem; }
  }
</style>
</head>

// State
let state = JSON.parse(localStorage.getItem('femboy-checklist') || '{}');
let currentDay = localStorage.getItem('femboy-day') || 'Senin';

function save() {
  localStorage.setItem('femboy-checklist', JSON.stringify(state));
  localStorage.setItem('femboy-day', currentDay);
}

function getCompletedCount(day) {
  const items = getAllItems(day);
  return items.filter(id => state[id]).length;
}

function getTotalCount(day) {
  return getAllItems(day).length;
}

function getAllItems(day) {
  const sched = SCHEDULE[day];
  const ids = [];
  for (const section of Object.values(sched.sections)) {
    for (const item of section) ids.push(item.id);
  }
  return ids;
}

function isDayComplete(day) {
  return getCompletedCount(day) === getTotalCount(day);
}

function updateStreak() {
  const done = DAYS.filter(d => isDayComplete(d)).length;
  document.getElementById('streakCount').textContent = `${done} / 7`;
}

function updateProgress(day) {
  const done = getCompletedCount(day);
  const total = getTotalCount(day);
  const pct = total > 0 ? (done / total) * 100 : 0;
  document.getElementById(`progress-fill-${day}`).style.width = pct + '%';
  document.getElementById(`progress-count-${day}`).textContent = `${done} / ${total}`;
  
  // Celebration
  const cel = document.getElementById(`cel-${day}`);
  if (done === total && total > 0) {
    cel.classList.add('show');
  } else {
    cel.classList.remove('show');
  }

  // Tab dot
  const tab = document.querySelector(`.day-tab[data-day="${day}"]`);
  if (isDayComplete(day)) tab.classList.add('completed');
  else tab.classList.remove('completed');

  updateStreak();
}

function spawnParticle(x, y) {
  const emojis = ['🌸','✨','💫','🌟','🌷','💕','⭐'];
  const el = document.createElement('span');
  el.className = 'particle';
  el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
  el.style.left = (x - 10) + 'px';
  el.style.top = (y - 10) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

function toggleItem(id, day, e) {
  state[id] = !state[id];
  save();
  const el = document.getElementById(`item-${id}`);
  el.classList.toggle('done', state[id]);
  if (state[id]) spawnParticle(e.clientX, e.clientY);
  updateProgress(day);
}

function switchDay(day) {
  currentDay = day;
  save();
  document.querySelectorAll('.day-tab').forEach(t => t.classList.toggle('active', t.dataset.day === day));
  document.querySelectorAll('.day-panel').forEach(p => p.classList.toggle('active', p.dataset.day === day));
}

function resetAll() {
  if (!confirm('Reset semua checklist? (tidak bisa dibatalkan)')) return;
  state = {};
  save();
  document.querySelectorAll('.check-item').forEach(el => el.classList.remove('done'));
  DAYS.forEach(d => updateProgress(d));
}

// Build UI
function buildTabs() {
  const container = document.getElementById('dayTabs');
  DAYS.forEach(day => {
    const tab = document.createElement('button');
    tab.className = 'day-tab' + (day === currentDay ? ' active' : '');
    tab.dataset.day = day;
    tab.innerHTML = `${SCHEDULE[day].emoji} ${day}<span class="tab-dot"></span>`;
    tab.onclick = () => switchDay(day);
    container.appendChild(tab);
  });
}

function buildPanels() {
  const container = document.getElementById('dayPanels');
  DAYS.forEach(day => {
    const sched = SCHEDULE[day];
    const panel = document.createElement('div');
    panel.className = 'day-panel' + (day === currentDay ? ' active' : '');
    panel.dataset.day = day;

    const total = getTotalCount(day);
    const done = getCompletedCount(day);
    const pct = total > 0 ? (done / total) * 100 : 0;

    let html = `
      <div class="progress-wrap">
        <div class="progress-header">
          <span class="progress-title">${sched.emoji} ${day} — ${sched.note}</span>
          <span class="progress-count" id="progress-count-${day}">${done} / ${total}</span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progress-fill-${day}" style="width:${pct}%"></div>
        </div>
      </div>
    `;

    for (const [section, items] of Object.entries(sched.sections)) {
      html += `<div class="section-label">${section}</div><div class="checklist">`;
      for (const item of items) {
        const isDone = !!state[item.id];
        html += `
          <div class="check-item${isDone ? ' done' : ''}" id="item-${item.id}" data-cat="${item.cat}" onclick="toggleItem('${item.id}','${day}',event)">
            <div class="checkbox">
              <svg class="checkmark" viewBox="0 0 12 10" fill="none">
                <polyline points="1,5 4.5,9 11,1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div class="item-content">
              <div class="item-text"><span class="item-emoji">${item.emoji}</span>${item.text}</div>
              ${item.sub ? `<div class="item-sub">${item.sub}</div>` : ''}
            </div>
            <div class="item-time">${item.time}</div>
          </div>
        `;
      }
      html += `</div>`;
    }

    html += `
      <div class="celebration" id="cel-${day}">
        <span class="cel-emoji">🌸✨🌸</span>
        <div class="cel-title">Hari ${day} selesai!</div>
        <div class="cel-sub">kamu luar biasa hari ini. istirahat yang baik 💕</div>
      </div>
    `;

    panel.innerHTML = html;
    container.appendChild(panel);

    if (isDayComplete(day)) {
      document.querySelector(`.day-tab[data-day="${day}"]`)?.classList.add('completed');
    }
  });
}

buildTabs();
buildPanels();
updateStreak();
</script>
